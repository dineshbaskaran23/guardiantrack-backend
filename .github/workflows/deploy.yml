name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Render deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        run: |
          echo "Triggering Render deployment..."
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy hook triggered successfully"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting 90 seconds for Render to build and start..."
          sleep 90

      - name: Health check
        run: |
          echo "Running health check..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_APP_URL }}/health")
          if [ "$STATUS" = "200" ]; then
            echo "Deployment successful - server is healthy"
          else
            echo "Health check failed - HTTP $STATUS"
            exit 1
          fi
